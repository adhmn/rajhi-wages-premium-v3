name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "Rajhi-Wages-Premium" --collect-all numpy --collect-all pandas --collect-all openpyxl run.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Rajhi-Wages-Premium-Program
          path: dist/Rajhi-Wages-Premium.exe
